version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Chicago
    open-pull-requests-limit: 10
    labels:
      - dependencies
    groups:
      expo-sdk:
        patterns:
          - "@expo/*"
          - "expo"
          - "expo-*"
          - "babel-preset-expo"
          - "jest-expo"
      react-native:
        patterns:
          - "@react-native/*"
          - "react"
          - "react-native"
          - "react-native-*"
