name: Feature request
description: Suggest an improvement to the open-source project.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What user need would this address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed approach
      description: Describe the behavior and any alternatives you considered.
    validations:
      required: true
  - type: textarea
    id: privacy
    attributes:
      label: Privacy and security impact
      description: Explain any effect on recordings, transcripts, API keys, storage, or network requests.
    validations:
      required: true
  - type: checkboxes
    id: scope
    attributes:
      label: Scope
      options:
        - label: This request does not include credentials or private user data.
          required: true
