name: Bug report
description: Report a reproducible problem in the open-source project.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve SayCopy. Do not include API keys, transcripts, recordings, or other sensitive data.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the problem and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Open ...
        2. Tap ...
        3. Observe ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: SayCopy version or commit
      placeholder: 1.0.0 or commit SHA
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: iOS version, device or simulator, and development tool versions where relevant.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs
      description: Remove tokens, transcripts, recordings, email addresses, and other private information.
      render: shell
  - type: checkboxes
    id: terms
    attributes:
      label: Safety check
      options:
        - label: I removed credentials and sensitive user data from this report.
          required: true
